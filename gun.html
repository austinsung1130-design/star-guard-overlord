<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StarGuard: Overlord 1 Evolution - Infinity</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body { margin: 0; background: #000; overflow: hidden; cursor: crosshair; font-family: 'Orbitron', sans-serif; touch-action: none; color: #fff; }
        #bulletin { position: absolute; top: 0; left: 0; width: 100%; background: rgba(0, 20, 40, 0.85); border-bottom: 2px solid #0ff; box-shadow: 0 0 15px rgba(0, 255, 255, 0.3); padding: 8px 0; font-size: 12px; color: #0ff; z-index: 20; overflow: hidden; }
        .marquee-wrapper { display: flex; white-space: nowrap; animation: marquee 25s linear infinite; }
        .marquee-content { display: flex; gap: 60px; padding-right: 60px; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .blink { animation: neon-blink 1.5s ease-in-out infinite; font-weight: bold; color: #fff; text-shadow: 0 0 5px #0ff, 0 0 10px #0ff; }
        @keyframes neon-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        #ui { position: absolute; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .screen { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; background: radial-gradient(circle, #051020 0%, #000 100%); }
        .color-picker { display: flex; gap: 15px; margin: 10px 0; }
        .color-dot { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; transition: 0.2s; }
        .color-dot.active { border-color: #ff0; box-shadow: 0 0 15px #ff0; transform: scale(1.2); }
        .skill-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 10px 0; }
        .skill-card { background: rgba(0,255,255,0.1); border: 1px solid #0ff; padding: 8px; border-radius: 5px; text-align: center; width: 95px; position: relative; }
        .awake-tag { position: absolute; top: -5px; right: -5px; background: #ff0; color: #000; font-size: 7px; padding: 2px 4px; border-radius: 3px; display: none; font-weight: bold; }
        .btn { padding: 10px 20px; background: #000; border: 1px solid #0ff; color: #0ff; cursor: pointer; border-radius: 3px; font-weight: bold; font-family: 'Orbitron'; transition: 0.2s; }
        .btn:hover { background: #0ff; color: #000; box-shadow: 0 0 20px #0ff; }
        #credits { position: absolute; bottom: 10px; left: 10px; font-size: 10px; color: #555; text-align: left; }
        #dev-panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; background: rgba(0, 10, 20, 0.98); border: 2px solid #f0f; padding: 20px; display: none; z-index: 100; pointer-events: auto; }
        #hud { position: absolute; top: 60px; left: 20px; display: none; pointer-events: none; }
        .bar-wrap { width: 240px; height: 12px; background: rgba(255,255,255,0.1); border: 1px solid #0ff; position: relative; margin-bottom: 5px; border-radius: 6px; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 0.2s; }
        #msg { position: absolute; bottom: 30%; left: 50%; transform: translateX(-50%); color: #ff0; font-size: 28px; font-weight: bold; text-shadow: 0 0 10px #ff0; pointer-events: none; opacity: 0; transition: 0.5s; z-index: 20; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="bulletin">
            <div class="marquee-wrapper">
                <div class="marquee-content">
                    <span class="blink">[SYSTEM STATUS: STABLE]</span>
                    <span>• 武器上限：LV 1000 超星神|500等解鎖幻彩彈藥</span>
                    <span>• 操作提示：戰鬥中按[R]鍵可立即結算 戰術裝備：[B]核爆清場|[P]核心超載</span>
                </div>
            </div>
        </div>

        <div id="lobby" class="screen">
            <input type="text" placeholder="CODE" oninput="if(this.value.toLowerCase()==='austin'){toggleDevPanel(true);this.value=''}" style="position:absolute; top:55px; right:10px; background:transparent; border:1px solid #222; color:#222; width:50px; font-size:10px;">
            
            <h1 style="color:#0ff; text-shadow: 0 0 30px #0ff; margin-bottom: 0;">STARGUARD</h1>
            <p style="font-size: 10px; color: #0ff; margin-bottom: 20px; letter-spacing: 5px;">INFINITY EVOLUTION</p>
            
            <div class="color-picker">
                <div class="color-dot active" style="background:#0ff" onclick="setShipColor('#0ff', 0)"></div>
                <div class="color-dot" style="background:#f0f" onclick="setShipColor('#f0f', 1)"></div>
                <div class="color-dot" style="background:#0f0" onclick="setShipColor('#0f0', 2)"></div>
                <div class="color-dot" style="background:#ff0" onclick="setShipColor('#ff0', 3)"></div>
            </div>
            
            <p style="color:#ff0; margin: 5px 0;">CREDITS: $<span id="m-val">0</span></p>
            <div class="skill-grid" id="skill-grid-container"></div>
            
            <div style="color:#0ff; font-weight: bold; margin-bottom: 20px; font-size: 0.9rem;">
                武器等級: LV <span id="w-val">1</span> 
                <button class="btn" onclick="buyWp()" style="padding:4px 8px; font-size:10px; margin-left:10px;">升級 $1000</button>
            </div>
            
            <button class="btn" onclick="start()" style="padding: 15px 70px; font-size: 1.3rem;">發動攻勢</button>
            <button id="reset-btn" onclick="handleReset()" style="margin-top: 20px; background: transparent; border: 1px solid #411; color: #622; font-size: 10px; padding: 5px 10px; cursor: pointer;">重置系統</button>
            
            <div id="credits">
                DEVELOPED BY: <span style="color:#0ff">AUSTIN</span> & <span style="color:#f0f">GEMINI AI</span><br>
                VERSION: 2.0.0 INFINITY
            </div>
        </div>

        <div id="dev-panel">
            <h2 style="color:#f0f; text-align:center;">ADMIN TERMINAL</h2>
            <button class="btn" style="width:100%; margin-bottom:5px;" onclick="devAction('max')">全能力/武器 MAX (1000)</button>
            <button class="btn" style="width:100%; margin-bottom:5px;" onclick="devAction('money')">注入 $99999</button>
            <button class="btn" onclick="toggleDevPanel(false)" style="width:100%; border-color:red; color:red;">關閉系統</button>
        </div>

        <div id="msg">SYSTEM</div>
        <div id="hud">
            <div id="wave-txt" style="color:#0ff; font-weight:bold; font-size: 20px;">WAVE 1</div>
            <div id="sc-txt">SCORE: 0</div>
            <div class="bar-wrap"><div id="hp-f" class="bar-fill" style="background:#0ff;"></div></div>
            <div id="wp-lv-hud" style="color:#ff0; font-size:12px;">WEAPON LV: 1</div>
        </div>
        
        <div id="boss-hud" style="position: absolute; top: 15px; left: 50%; transform: translateX(-50%); width: 400px; display: none;">
            <div class="bar-wrap" style="width:100%; border-color:red; height: 15px;"><div id="b-f" class="bar-fill" style="background:red;"></div></div>
            <div id="b-status" style="color:red; text-align:center; font-size:10px;">WARNING: BOSS ACTIVE</div>
        </div>
    </div>
    <canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
let w, h, scene = 'lobby', frame = 0, resetStep = 0;

let store = JSON.parse(localStorage.getItem('sg_v1000')) || { 
    m: 500, wp: 1, shipColor: '#0ff',
    skills: { repair: 0, shield: 0, greed: 0, crit: 0, speed: 0, cool: 0 }
};

let run = { hp: 100, sh: 0, wp: 1, sc: 0, wv: 1, p: {x:0, y:0}, b: [], e: [], eb: [], it: [], boss: null, killCount: 0, parts: [], shake: 0, pTimer: 0 };

function save() { localStorage.setItem('sg_v1000', JSON.stringify(store)); }
function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
window.onresize = resize; resize();

function toggleDevPanel(s) { document.getElementById('dev-panel').style.display = s?'block':'none'; }
function devAction(a) { 
    if(a==='max') { Object.keys(store.skills).forEach(k=>store.skills[k]=5); store.wp=1000; }
    if(a==='money') store.m+=99999;
    refreshUI(); save();
}

function handleReset() {
    const btn = document.getElementById('reset-btn');
    if(resetStep === 0) {
        resetStep = 1; btn.innerText = "確定刪除？"; 
        setTimeout(() => { resetStep = 0; btn.innerText = "重置系統"; }, 3000);
    } else { localStorage.removeItem('sg_v1000'); location.reload(); }
}

function showMsg(t) {
    const m = document.getElementById('msg'); m.innerText = t; m.style.opacity = 1;
    setTimeout(() => m.style.opacity = 0, 1500);
}

function setShipColor(c, idx) {
    store.shipColor = c;
    document.querySelectorAll('.color-dot').forEach((d, i) => d.style.borderColor = (i===idx?'#ff0':'#fff'));
    save();
}

function buySkill(t) { if(store.m>=1000 && store.skills[t]<5){ store.m-=1000; store.skills[t]++; refreshUI(); save(); }}
function buyWp() { if(store.m>=1000 && store.wp<1000){ store.m-=1000; store.wp+=20; refreshUI(); save(); }}

function refreshUI() {
    document.getElementById('m-val').innerText = store.m;
    document.getElementById('w-val').innerText = store.wp;
    const container = document.getElementById('skill-grid-container');
    container.innerHTML = '';
    const names = {repair:'維修', shield:'護盾', greed:'貪婪', crit:'暴擊', speed:'彈道', cool:'冷卻'};
    Object.keys(store.skills).forEach(s => {
        container.innerHTML += `<div class="skill-card"><div class="awake-tag" style="display:${store.skills[s]>=5?'block':'none'}">MAX</div><h4 style="margin:2px; font-size:10px;">${names[s]}</h4><div style="font-size:9px;">LV ${store.skills[s]}</div><button class="btn" onclick="buySkill('${s}')" style="font-size:8px; padding:2px;">$1000</button></div>`;
    });
}

function start() {
    run = { hp: 100, sh: store.skills.shield * 50, wp: store.wp, sc: 0, wv: 1, p: {x: w/2, y: h*0.8}, b: [], e: [], eb: [], it: [], boss: null, killCount: 0, parts: [], shake: 0, pTimer: 0 };
    scene = 'game'; document.getElementById('lobby').style.display = 'none'; document.getElementById('hud').style.display = 'block';
}

function createExplosion(x, y, color, count = 12, force = 8) {
    run.shake = Math.min(run.shake + count/4, 20);
    for (let i = 0; i < count; i++) {
        run.parts.push({ x, y, vx: (Math.random()-0.5)*force, vy: (Math.random()-0.5)*force, life: 1, c: color, s: Math.random()*3+2 });
    }
}

// 核心武器系統：1000 等進化邏輯
function fire() {
    let cd = 7 - (store.skills.cool * 0.9);
    if (run.pTimer > 0) cd *= 0.4;
    if (frame % Math.max(1, Math.floor(cd)) !== 0) return;
    
    const lv = run.wp, p = run.p, c = store.shipColor;
    const isRainbow = lv >= 500;
    const bulletColor = isRainbow ? `hsl(${frame % 360}, 100%, 50%)` : c;
    
    // 基礎 & 散彈 (Lv 1 - 40)
    run.b.push({x: p.x, y: p.y-20, vx: 0, vy: -15, w: 5, c: bulletColor});
    if(lv >= 40) {
        run.b.push({x: p.x, y: p.y, vx: -3, vy: -14, w: 4, c: bulletColor});
        run.b.push({x: p.x, y: p.y, vx: 3, vy: -14, w: 4, c: bulletColor});
    }

    // 環繞彈 (Lv 20, 60...)
    if(lv >= 20) {
        let a = frame * 0.2;
        run.b.push({x: p.x + Math.cos(a)*40, y: p.y + Math.sin(a)*40, vx: 0, vy: -18, w: 3, c: '#fff'});
    }

    // 八向攻擊 (Lv 80+)
    if(lv >= 80 && frame % 10 === 0) {
        for(let i=0; i<8; i++) {
            let ang = (i/8) * Math.PI * 2;
            run.b.push({x: p.x, y: p.y, vx: Math.cos(ang)*8, vy: Math.sin(ang)*8, w: 4, c: '#0ff'});
        }
    }

    // 追蹤彈 (Lv 100+)
    if(lv >= 100 && frame % 15 === 0 && run.e.length > 0) {
        let target = run.e[0];
        run.b.push({x: p.x, y: p.y, vx: (target.x-p.x)*0.05, vy: (target.y-p.y)*0.05, w: 6, c: '#f0f', t: 'homing'});
    }

    // 分裂爆炸彈 (Lv 200+)
    if(lv >= 200 && frame % 30 === 0) {
        run.b.push({x: p.x, y: p.y, vx: 0, vy: -10, w: 10, c: '#ff0', t: 'bomb'});
    }

    // 小龍炮 (Lv 400+ 前方重火力)
    if(lv >= 400) {
        run.b.push({x: p.x-10, y: p.y-30, vx: 0, vy: -25, w: 2, c: '#fff', pen: true});
        run.b.push({x: p.x+10, y: p.y-30, vx: 0, vy: -25, w: 2, c: '#fff', pen: true});
    }

    // 1000 等：超星神模式 (全屏覆蓋)
    if(lv >= 1000) {
        run.shake = 2;
        let randAng = Math.random() * Math.PI * 2;
        run.b.push({x: p.x, y: p.y, vx: Math.cos(randAng)*15, vy: Math.sin(randAng)*15, w: 12, c: `hsl(${frame*5 % 360}, 100%, 70%)`, pen: true});
    }
}

function updateGame() {
    ctx.save();
    if (run.shake > 0) { ctx.translate((Math.random()-0.5)*run.shake, (Math.random()-0.5)*run.shake); run.shake *= 0.9; }
    ctx.fillStyle = "rgba(0, 5, 15, 0.4)"; ctx.fillRect(0,0,w,h);

    if(frame % 120 === 0 && run.hp < 100 && store.skills.repair > 0) run.hp = Math.min(100, run.hp + store.skills.repair * 2);
    if(run.pTimer > 0) run.pTimer--;

    // 粒子系統
    run.parts.forEach((pt, i) => { pt.x += pt.vx; pt.y += pt.vy; pt.life -= 0.02; ctx.globalAlpha = pt.life; ctx.fillStyle = pt.c; ctx.fillRect(pt.x, pt.y, pt.s, pt.s); if (pt.life <= 0) run.parts.splice(i, 1); });
    ctx.globalAlpha = 1;

    // 繪製玩家 (1000等發光)
    ctx.shadowBlur = run.wp >= 1000 ? 20 : 0;
    ctx.shadowColor = store.shipColor;
    ctx.fillStyle = store.shipColor;
    ctx.beginPath(); ctx.moveTo(run.p.x, run.p.y-25); ctx.lineTo(run.p.x-20, run.p.y+15); ctx.lineTo(run.p.x+20, run.p.y+15); ctx.fill();
    ctx.shadowBlur = 0;

    fire();

    // 道具
    run.it.forEach((it, i) => {
        it.y += 2; ctx.fillStyle = it.t==='bomb'?'#ff0':'#f0f';
        ctx.font = "bold 14px Orbitron"; ctx.fillText(it.t==='bomb'?'[B]':'[P]', it.x-10, it.y);
        if(Math.hypot(it.x-run.p.x, it.y-run.p.y)<35) {
            if(it.t==='bomb') { run.e.forEach(en=>{createExplosion(en.x,en.y,'#fff',15); en.hp=0;}); run.eb=[]; run.shake=25; showMsg("SUPER BOMB!"); }
            else { run.pTimer=400; showMsg("OVERLOAD!"); }
            run.it.splice(i,1);
        }
    });

    // 敵人生成 (多樣性)
    if(!run.boss && run.killCount < 40) {
        if(Math.random() < 0.06 + (run.wv*0.01)) {
            let typeR = Math.random();
            let e = { x: Math.random()*w, y: -30, s: 2+run.wv*0.2, hp: 3+run.wv, vx: 0, t: 'std', c: '#f0f' };
            if (typeR > 0.85) { e.t = 'side'; e.vx = (Math.random()-0.5)*8; e.c = '#0f0'; }
            else if (typeR > 0.7) { e.t = 'split'; e.c = '#0af'; e.hp *= 2; }
            else if (typeR > 0.5) { e.t = 'kami'; e.c = '#ff0'; e.s *= 1.5; }
            run.e.push(e);
        }
    } else if(!run.boss) {
        run.boss = { x: w/2, y: -100, hp: 8000*run.wv, max: 8000*run.wv, r: 80, mode: 'idle', t: 0 };
        document.getElementById('boss-hud').style.display = 'block';
    }

    // 敵人邏輯
    run.e.forEach((e, i) => {
        if(e.t==='side'){ e.x+=e.vx; if(e.x<0||e.x>w) e.vx*=-1; }
        if(e.t==='kami') e.x+=(run.p.x-e.x)*0.04;
        e.y += e.s;
        
        ctx.fillStyle = e.c;
        ctx.beginPath(); ctx.arc(e.x, e.y, 20, 0, 7); ctx.fill();
        
        // 碰撞檢測
        run.b.forEach(b => {
            if(Math.hypot(e.x-b.x, e.y-b.y)<25){
                e.hp -= (Math.random()<store.skills.crit*0.15?5:1);
                if(b.t==='bomb') { createExplosion(b.x, b.y, '#ff0', 8); e.hp -= 10; }
                if(!b.pen) b.y=-9999;
            }
        });

        if(e.hp<=0){
            createExplosion(e.x,e.y,e.c,15);
            if(e.t==='split') { // 分裂怪
                run.e.push({x: e.x-20, y: e.y, s: e.s, hp: 2, vx: -2, t: 'std', c: '#0af'});
                run.e.push({x: e.x+20, y: e.y, s: e.s, hp: 2, vx: 2, t: 'std', c: '#0af'});
            }
            if(Math.random()<0.15) run.it.push({x:e.x, y:e.y, t:Math.random()<0.5?'bomb':'power'});
            run.e.splice(i,1); run.sc+=100; run.killCount++; store.m+=(15+store.skills.greed*10);
        } else if(Math.hypot(e.x-run.p.x, e.y-run.p.y)<35) {
            run.sh>0?run.sh-=25:run.hp-=25; run.e.splice(i,1);
        }
    });

    // BOSS 系統
    if(run.boss) {
        let b = run.boss; b.t++;
        b.y < 120 ? b.y+=1.5 : b.x = w/2 + Math.sin(frame*0.02)*(w/3);
        
        // Boss 攻擊模式
        if(frame % 100 === 0) b.mode = Math.random() > 0.5 ? 'beam' : 'spiral';
        
        if(b.mode === 'spiral' && frame % 5 === 0) {
            for(let k=0; k<6; k++) {
                let a = (frame*0.1) + (k*Math.PI/3);
                run.eb.push({x:b.x, y:b.y, vx:Math.cos(a)*6, vy:Math.sin(a)*6});
            }
        }
        if(b.mode === 'beam') {
            ctx.fillStyle = "rgba(255,0,0,0.3)"; ctx.fillRect(b.x-20, b.y, 40, h);
            if(frame % 2 === 0) run.eb.push({x: b.x + (Math.random()-0.5)*40, y: b.y, vx: 0, vy: 10});
        }

        ctx.fillStyle = '#f30'; ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, 7); ctx.fill();
        run.b.forEach(bu => { if(Math.hypot(b.x-bu.x, b.y-bu.y)<b.r){ b.hp-=20; if(!bu.pen) bu.y=-9999; }});
        if(b.hp<=0){ run.wv++; run.killCount=0; run.boss=null; document.getElementById('boss-hud').style.display='none'; showMsg("WAVE CLEAR!"); }
        document.getElementById('b-f').style.width = (b.hp/b.max*100) + "%";
    }

    // 子彈與敵彈
    run.b.forEach((b, i) => { 
        b.x+=b.vx||0; b.y+=b.vy; 
        ctx.fillStyle=b.c; ctx.fillRect(b.x-b.w/2, b.y, b.w, 15); 
        if(b.y<-200 || b.y>h+200) run.b.splice(i,1); 
    });
    run.eb.forEach((eb, i) => { 
        eb.x+=eb.vx||0; eb.y+=eb.vy; ctx.fillStyle='#f00'; ctx.beginPath(); ctx.arc(eb.x, eb.y, 8, 0, 7); ctx.fill(); 
        if(Math.hypot(eb.x-run.p.x, eb.y-run.p.y)<20){ run.sh>0?run.sh-=15:run.hp-=15; run.eb.splice(i,1); } 
        if(eb.y > h) run.eb.splice(i,1);
    });
    
    document.getElementById('hp-f').style.width = Math.max(0, run.hp) + "%";
    document.getElementById('sc-txt').innerText = "SCORE: " + run.sc;
    document.getElementById('wave-txt').innerText = "WAVE " + run.wv;
    document.getElementById('wp-lv-hud').innerText = "WEAPON LV: " + run.wp;
    if(run.hp <= 0) die();
    ctx.restore();
}

function die() {
    scene = 'lobby'; save(); document.getElementById('lobby').style.display='flex'; document.getElementById('hud').style.display='none'; refreshUI();
}

// 按鍵監聽
window.onkeydown = e => {
    if(scene === 'game' && e.key.toLowerCase() === 'r') {
        showMsg("SURRENDERED");
        setTimeout(die, 500);
    }
};

window.onmousemove = e => { if(run.p){run.p.x = e.clientX; run.p.y = e.clientY;} };
window.ontouchmove = e => { e.preventDefault(); if(run.p){run.p.x = e.touches[0].clientX; run.p.y = e.touches[0].clientY - 40;} };

function loop() { if (scene === 'game') updateGame(); frame++; requestAnimationFrame(loop); }
refreshUI(); loop();
</script>
</body>
</html>
